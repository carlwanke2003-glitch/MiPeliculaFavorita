<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Contacto - Rápidos y Furiosos</title>
   <link rel="icon" type="image/png" href="imagenes/logo esquinero.jpg">
  <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a class="brand" href="index.html">Rápidos y Furiosos</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="cronologia.html">Cronología</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <header class="hero" id="inicio">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Contacto</h1>
      <p class="hero-subtitle">¿Tienes algo que decir sobre la saga? Envíame un mensaje rápido.</p>
    </div>
  </header>

  <main>
    <section class="card form-card">
      <div class="timeline-header">
        <h3>Escríbeme</h3>
        <p>Completa el formulario y hazme saber qué te emociona de la saga Fast & Furious.</p>
      </div>
      <form action="#" method="post">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" placeholder="Cuéntame qué te gusta de la saga" required></textarea>
        </div>
        <button type="submit" class="button full-width">Enviar</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    Proyecto HTML y CSS - Mi película favorita
  </footer>
</body>
</html>
